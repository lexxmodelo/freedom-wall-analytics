# File-to-anonymized-code mapping for the topic_modeling phase.
#
# Source files: preprocessing/output/*.json (10 files)
# Base scheme: methodology_changes.md §2.4 (12 institutions across MM/PROV/CAR).
#
# REGIONAL ANONYMIZATION NOTE
# This file ships in the public repository with the school_alias field stripped
# (set to null). The cluster code, region, and confidence remain visible because
# they are referenced by the manuscript and by every downstream artifact. Team
# members who need the alias-aware view during local development can drop a
# `university_mapping.local.yaml` next to this file (gitignored) with entries
# of the form:
#
#     overrides:
#       MM-PSEC-1: { school_alias: <ALIAS> }
#       MM-PUB-1:  { school_alias: <ALIAS> }
#       ...
#
# The dashboard ETL (`build_dashboard_data.py`) reads the override file when
# present and merges it into the loaded mapping; production builds run without
# it and produce alias-free dashboard data.
#
# SCHEME EXTENSIONS (per action_log.md ACTION-002):
#   - PROV-PNSEC-1 (formerly mis-coded CAR-PNSEC-2) is the second CALABARZON
#     private non-sectarian slot; the original CAR-PNSEC-2 code mis-located a
#     CALABARZON campus in the Cordillera Administrative Region.
#   - MIN cluster added for the single Mindanao institution (MIN-PUB-1).
#
# Pipeline behavior: pre-flight refuses to run if any assigned file is
# unmapped, has code "TBD", or is marked active: false. Toggle active: false
# to exclude a file.

mappings:
  FW-01_cleaned.json:
    code: MM-PSEC-1
    school_alias: null
    region: NCR
    confidence: provisional
    active: true

  FW-02_cleaned.json:
    code: MM-PUB-1
    school_alias: null
    region: NCR
    confidence: provisional
    active: true

  FW-03_cleaned.json:
    code: MM-PNSEC-1
    school_alias: null
    region: NCR
    confidence: provisional
    active: true

  FW-04_cleaned.json:
