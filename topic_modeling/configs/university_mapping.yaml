    active: true
    note: "Methodology §2.4 extension: second CALABARZON private non-sectarian slot. Originally mis-coded as CAR-PNSEC-2 before the regional reclassification was caught during the Fig 12 audit. See action_log.md ACTION-002."

  FW-06_cleaned.json:
